<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Victor OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @keyframes pop {
            from {
                transform: translateX(-50%) scale(0.8);
                opacity: 0;
            }

            to {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: url('https://wallpaperaccess.com/full/317501.jpg') center/cover;
            overflow: hidden;
        }

        /* LOCK SCREEN */
        #lock {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        /* DESKTOP */
        #desktop {
            display: none;
            height: 100vh;
        }

        /* TASKBAR */
        .taskbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 10px;
            border-radius: 15px;
        }

        li[draggable="true"]:hover {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 5px;
        }

        /* WINDOW */
        .window {
            position: absolute;
            width: 350px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 10px;
            display: none;
            color: white;
        }

        .titlebar {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            cursor: move;
            display: flex;
            justify-content: space-between;
        }

        .icon {
            width: 70px;
            text-align: center;
            color: white;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            user-select: none;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .content {
            padding: 10px;
        }

        button {
            margin: 3px;
        }

        input,
        textarea {
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <!-- LOCK SCREEN -->
    <div id="lock">
        <h1 id="clock"></h1>
        <p>Click to Enter</p>
    </div>

    <!-- DESKTOP -->
    <div id="desktop">
        <!-- START MENU PRO -->
        <div id="startMenu" style="
position: fixed;
bottom: 90px;
left: 50%;
transform: translateX(-50%);
width: 360px;
background: rgba(15,23,42,0.95);
backdrop-filter: blur(20px);
border-radius: 16px;
padding: 15px;
display: none;
color: white;
z-index: 99999;
animation: pop .2s ease;
">

            <!-- SEARCH -->
            <input id="startSearch" placeholder="Search apps..."
                style="width:100%; padding:8px; border-radius:8px; border:none;">

            <!-- APPS GRID -->
            <div style="
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        gap:10px;
        margin-top:15px;
    ">

                <div onclick="openWin('files')" style="text-align:center; cursor:pointer;">
                    📁<br>Files
                </div>

                <div onclick="openWin('calc')" style="text-align:center; cursor:pointer;">
                    🧮<br>Calc
                </div>

                <div onclick="openWin('browser')" style="text-align:center; cursor:pointer;">
                    🌐<br>Browser
                </div>

            </div>

        </div>
        <!-- DESKTOP ICONS -->
        <div id="desktopIcons" style="
position:absolute;
top:20px;
left:20px;
display:grid;
grid-template-columns:repeat(1,80px);
gap:15px;
z-index:1;
">

            <div class="icon" ondblclick="openWin('files')" draggable="true">
                📁<br><small>Files</small>
            </div>

            <div class="icon" ondblclick="openWin('calc')" draggable="true">
                🧮<br><small>Calc</small>
            </div>

            <div class="icon" ondblclick="openWin('browser')" draggable="true">
                🌐<br><small>Browser</small>
            </div>

        </div>


        <div class="taskbar">
            <button onclick="openWin('files')">📁 Files</button>
            <button onclick="openWin('calc')">🧮 Calc</button>
            <button onclick="openWin('browser')">🌐 Browser</button>
        </div>
    </div>
    <!-- START MENU -->
    <div id="startMenu" style="
position: fixed;
bottom: 80px;
left: 50%;
transform: translateX(-50%);
width: 320px;
background: rgba(30,41,59,0.85);
backdrop-filter: blur(20px);
border-radius: 15px;
padding: 15px;
display: none;
color: white;
z-index: 9999;
">
        <div id="contextMenu" style="
position: fixed;
display: none;
top: 0;
left: 0;
background: rgba(30,41,59,0.95);
backdrop-filter: blur(15px);
border-radius: 10px;
padding: 10px;
color: white;
z-index: 999999;
pointer-events: auto;
">

            <div onclick="addFile()">📄 New File</div>
            <div onclick="addFolder()">📁 New Folder</div>
            <div onclick="loadFiles()">🔄 Refresh</div>

        </div>

        <h3>Start</h3>

        <button onclick="openWin('files')">📁 File Explorer</button><br><br>
        <button onclick="openWin('calc')">🧮 Calculator</button><br><br>
        <button onclick="openBrowser()">🌐 Browser</button>

    </div>

    <!-- FILES -->
    <div class="window" id="files" style="display:none;">
        <div class="titlebar" onmousedown="drag(this.parentElement)">
            📁 File Explorer
            <span onclick="closeWin('files')">✖</span>
        </div>

        <div class="content">

            <!-- NAV BAR -->
            <button onclick="goBack()">⬅ Back</button>
            <button onclick="addFile()">+ File</button>
            <button onclick="addFolder()">+ Folder</button>

            <!-- PATH -->
            <div id="pathBar" style="margin:8px 0; opacity:0.7;"></div>

            <!-- LIST -->
            <ul id="explorerList"></ul>

        </div>
    </div>
    <div class="window" id="browser" style="display:none;">
        <div class="titlebar" onmousedown="drag(this.parentElement)">
            🌐 Insane Browser
            <span onclick="closeWin('browser')">✖</span>
        </div>

        <div class="content">

            <!-- TABS -->
            <div id="tabs" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px;"></div>

            <button onclick="newTab()">➕ Tab</button>

            <!-- NAV -->
            <div style="display:flex; gap:5px; margin-top:8px;">
                <button onclick="backPage()">⬅</button>
                <button onclick="forwardPage()">➡</button>
                <button onclick="refreshPage()">🔄</button>
            </div>

            <!-- URL -->
            <input id="urlBar" placeholder="https://example.com" style="width:70%;">
            <button onclick="goSite()">Go</button>

            <!-- FRAME -->
            <iframe id="browserFrame" style="width:100%; height:250px; margin-top:10px; border:none;">
            </iframe>

        </div>
    </div>
    <!-- CALC -->
    <div class="window" id="calc">
        <div class="titlebar" onmousedown="drag(this.parentElement)">
            Calculator <span onclick="closeWin('calc')">✖</span>
        </div>
        <div class="content">
            <input id="a"><br>
            <input id="b"><br>
            <button onclick="calc()">+</button>
            <p id="res"></p>
        </div>
    </div>

    </div>
    <script>
        console.log("OS BOOTING...");
        /* DRAG ICONS */
        let icon = null;

        document.addEventListener("dragstart", function (e) {
            if (e.target.classList.contains("icon")) {
                icon = e.target;
            }
        });

        document.addEventListener("dragover", function (e) {
            e.preventDefault();
        });

        document.addEventListener("drop", function (e) {
            e.preventDefault();

            if (!icon) return;

            let x = e.clientX;
            let y = e.clientY;

            icon.style.position = "absolute";
            icon.style.left = x + "px";
            icon.style.top = y + "px";

            icon = null;
        });
        let activeApp = null;
        let openApps = {};

        function setActiveApp(id) {
            activeApp = id;

            document.querySelectorAll(".window").forEach(w => {
                w.style.zIndex = "10";
            });

            let win = document.getElementById(id);
            if (win) win.style.zIndex = "100";
        }
        document.addEventListener("mousedown", function (e) {
            let win = e.target.closest(".window");

            if (win) {
                setActiveApp(win.id);
            }
        });
        /* =======================
           LOCK + DESKTOP
        ======================= */
        setInterval(() => {
            let clock = document.getElementById("clock");
            if (clock) clock.innerText = new Date().toLocaleTimeString();
        }, 1000);

        document.getElementById("lock").onclick = function () {
            document.getElementById("lock").style.display = "none";
            document.getElementById("desktop").style.display = "block";
            console.log("DESKTOP LOADED");
        };

        /* =======================
           WINDOWS SYSTEM
        ======================= */
        let tabs = [];
        let activeTab = 0;
        function handleItem(i) {
            let item = currentFolder.children[i];

            if (item.type === "folder") {
                enterFolder(i);
            } else {
                openFileFromFS(item);
            }
        }
        function openFileFromFS(file) {
            openWin("viewer");

            let box = document.getElementById("fileContent");
            if (box) box.value = file.content || "";

            window.activeFile = file;
        }
        let draggedItem = null;
        let draggedPath = [];
        function saveFile() {
            if (!window.activeFile) return;

            window.activeFile.content =
                document.getElementById("fileContent").value;

            saveFS();
            alert("Saved!");
        }
        setTimeout(loadExplorer, 500);
        /* CREATE FIRST TAB */
        function initBrowser() {
            if (tabs.length === 0) {
                newTab();
            }
        }
        let fileSystem = JSON.parse(localStorage.getItem("fs")) || {
            name: "root",
            type: "folder",
            children: []
        };

        let currentPath = [];
        let currentFolder = fileSystem;

        /* SAVE */
        function saveFS() {
            localStorage.setItem("fs", JSON.stringify(fileSystem));
        }

        /* NAVIGATE INTO FOLDER */
        function enterFolder(index) {
            let item = currentFolder.children[index];

            if (item.type !== "folder") return;

            currentPath.push(index);
            currentFolder = item;

            loadExplorer();
        }

        /* BACK */
        function goBack() {
            if (currentPath.length === 0) return;

            currentPath.pop();

            currentFolder = fileSystem;
            for (let i of currentPath) {
                currentFolder = currentFolder.children[i];
            }

            loadExplorer();
        }

        /* CREATE FILE */
        function addFile() {
            let name = prompt("File name");
            if (!name) return;

            currentFolder.children.push({
                name,
                type: "file",
                content: ""
            });

            saveFS();
            loadExplorer();
        }

        /* CREATE FOLDER */
        function addFolder() {
            let name = prompt("Folder name");
            if (!name) return;

            currentFolder.children.push({
                name,
                type: "folder",
                children: []
            });

            saveFS();
            loadExplorer();
        }
        /* START MENU TOGGLE */
        function toggleStart() {
            let menu = document.getElementById("startMenu");

            if (!menu) return;

            menu.style.display =
                menu.style.display === "block" ? "none" : "block";
        }

        /* CLOSE WHEN CLICKING OUTSIDE */
        document.addEventListener("click", function (e) {
            let menu = document.getElementById("startMenu");

            if (!menu) return;

            let isClickInside = menu.contains(e.target);
            let isStartButton = e.target.innerText.includes("Start");

            if (!isClickInside && !isStartButton) {
                menu.style.display = "none";
            }
        });

        /* NEW TAB */
        function newTab() {
            tabs.push({ url: "https://example.com", history: [], index: 0 });

            activeTab = tabs.length - 1;
            renderTabs();
            loadTab();
        }

        /* SWITCH TAB */
        function switchTab(i) {
            activeTab = i;
            renderTabs();
            loadTab();
        }

        /* CLOSE TAB */
        function closeTab(i) {
            tabs.splice(i, 1);

            if (tabs.length === 0) {
                document.getElementById("browserFrame").src = "";
                return;
            }

            activeTab = Math.max(0, activeTab - 1);
            renderTabs();
            loadTab();
        }

        /* RENDER TABS */
        function renderTabs() {
            let container = document.getElementById("tabs");
            container.innerHTML = "";

            tabs.forEach((t, i) => {
                container.innerHTML += `
            <div style="
                padding:5px;
                background:${i === activeTab ? '#3b82f6' : '#334155'};
                border-radius:5px;
                cursor:pointer;
                color:white;
                display:flex;
                gap:5px;
                align-items:center;
            ">
                <span onclick="switchTab(${i})">Tab ${i + 1}</span>
                <span onclick="closeTab(${i})">✖</span>
            </div>
        `;
            });
        }

        /* LOAD TAB */
        function loadTab() {
            let tab = tabs[activeTab];
            document.getElementById("browserFrame").src = tab.url;
            document.getElementById("urlBar").value = tab.url;
        }

        /* GO TO SITE */
        function goSite(urlInput) {
            let url = urlInput || document.getElementById("urlBar").value;

            if (!url) return;

            if (!url.startsWith("http")) {
                url = "https://" + url;
            }

            tabs[activeTab].url = url;
            loadTab();
        }
        function loadExplorer() {
            let list = document.getElementById("explorerList");
            let pathBar = document.getElementById("pathBar");

            if (!list || !pathBar) return;

            list.innerHTML = "";

            /* PATH DISPLAY */
            let pathNames = ["root"];
            let temp = fileSystem;

            for (let i of currentPath) {
                temp = temp.children[i];
                pathNames.push(temp.name);
            }

            pathBar.innerText = pathNames.join(" / ");

            currentFolder.children.forEach((item, i) => {
                list.innerHTML += `
        <li 
            draggable="true"
            ondragstart="startDrag(${i})"
            ondragover="allowDrop(event)"
            ondrop="dropItem(${i})"
            onclick="handleItem(${i})"
            style="cursor:pointer; padding:5px;"
        >
            ${item.type === "folder" ? "📁" : "📄"} ${item.name}
        </li>
    `;
            });
            saveFS();
        }

        /* START DRAG */
        function startDrag(index) {
            draggedItem = index;

            // store current path (so we know where it came from)
            draggedPath = [...currentPath];
        }

        /* ALLOW DROP */
        function allowDrop(e) {
            e.preventDefault();
        }

        /* DROP INTO ITEM */
        function dropItem(targetIndex) {
            if (draggedItem === null) return;

            let sourceFolder = getFolderFromPath(draggedPath);
            let targetItem = currentFolder.children[targetIndex];

            // only allow dropping INTO folders
            if (targetItem.type !== "folder") return;

            let movingItem = sourceFolder.children[draggedItem];

            // remove from source
            sourceFolder.children.splice(draggedItem, 1);

            // add to target folder
            targetItem.children.push(movingItem);

            saveFS();
            loadExplorer();

            draggedItem = null;
        }

        function getFolderFromPath(path) {
            let folder = fileSystem;

            for (let i of path) {
                folder = folder.children[i];
            }

            return folder;
        }

        /* NAV */
        function backPage() { }
        function forwardPage() { }
        function refreshPage() {
            let frame = document.getElementById("browserFrame");
            frame.src = frame.src;
        }

        /* AUTO START */
        setTimeout(initBrowser, 500);
        function openWin(id) {
            let el = document.getElementById(id);
            if (el) el.style.display = "block";
        }

        function closeWin(id) {
            let el = document.getElementById(id);
            if (el) el.style.display = "none";
        }

        /* =======================
           DRAG SYSTEM (SAFE)
        ======================= */
        let activeWin = null;
        let offsetX = 0;
        let offsetY = 0;

        function drag(el) {
            activeWin = el;

            document.onmousemove = move;
            document.onmouseup = stop;
        }

        function move(e) {
            if (!activeWin) return;
            activeWin.style.left = e.clientX + "px";
            activeWin.style.top = e.clientY + "px";
        }

        function stop() {
            activeWin = null;
            document.onmousemove = null;
        }

        /* =======================
           START MENU
        ======================= */
        function toggleStart() {
            let menu = document.getElementById("startMenu");
            if (!menu) return;

            menu.style.display =
                menu.style.display === "block" ? "none" : "block";
        }

        /* =======================
           RIGHT CLICK MENU
        ======================= */
        window.oncontextmenu = function (e) {
            e.preventDefault();
            let menu = document.getElementById("contextMenu");
            if (!menu) return;

            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
            return false;
        };

        document.addEventListener("click", () => {
            let menu = document.getElementById("contextMenu");
            if (menu) menu.style.display = "none";
        });

        /* =======================
           FILE SYSTEM (BASIC RESTORE)
        ======================= */
        function addFile() {
            let name = prompt("File name");
            if (!name) return;

            let files = JSON.parse(localStorage.getItem("files") || "[]");
            files.push({ name, content: "" });

            localStorage.setItem("files", JSON.stringify(files));
            loadFiles();
        }

        function loadFiles() {
            let files = JSON.parse(localStorage.getItem("files") || "[]");
            let list = document.getElementById("fileList");
            if (!list) return;

            list.innerHTML = "";

            files.forEach((f, i) => {
                list.innerHTML += `
            <li onclick="openFile(${i})">${f.name}</li>
        `;
            });
        }

        function openFile(i) {
            let files = JSON.parse(localStorage.getItem("files") || "[]");
            let file = files[i];

            let viewer = document.getElementById("viewer");
            let box = document.getElementById("fileContent");

            if (viewer) viewer.style.display = "block";
            if (box) box.value = file.content || "";

            window.currentFile = i;
        }

        function saveFile() {
            let files = JSON.parse(localStorage.getItem("files") || "[]");

            files[window.currentFile].content =
                document.getElementById("fileContent").value;

            localStorage.setItem("files", JSON.stringify(files));

            alert("Saved!");
            loadFiles();
        }

        /* INIT */
        loadFiles();

        function openBrowser() {
            let url = prompt("Enter website (e.g. google.com)");

            if (!url) return;

            if (!url.startsWith("http")) {
                url = "https://" + url;
            }

            window.open(url, "_blank");
        }
    </script>

</body>

</html>
